<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora AI - Ingia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f13, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(168,85,247,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 15px;
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #a1a1aa;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group input {
            width: 100%;
            background: #1a1a24;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            padding: 14px 18px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .input-group input:focus {
            border-color: #a855f7;
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            border-radius: 16px;
            padding: 14px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid #2a2a3a;
            color: #a1a1aa;
        }
        .error {
            color: #f87171;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 10px;
        }
        .switch {
            text-align: center;
            color: #a1a1aa;
            font-size: 0.85rem;
        }
        .switch a {
            color: #c084fc;
            cursor: pointer;
            text-decoration: none;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <div class="logo-icon">✦</div>
        <div class="logo-text">Nexora AI</div>
    </div>
    
    <div id="loginForm">
        <div class="subtitle">Ingia kwenye akaunti yako</div>
        <div class="input-group">
            <input type="text" id="loginUsername" placeholder="Jina la mtumiaji">
        </div>
        <div class="input-group">
            <input type="password" id="loginPassword" placeholder="Password">
        </div>
        <button class="btn" onclick="login()">Ingia</button>
        <div class="switch">Huna akaunti? <a onclick="showSignup()">Jisajili</a></div>
        <div id="loginError" class="error"></div>
    </div>
    
    <div id="signupForm" class="hidden">
        <div class="subtitle">Jisajili kwa bure</div>
        <div class="input-group">
            <input type="text" id="signupUsername" placeholder="Jina la mtumiaji">
        </div>
        <div class="input-group">
            <input type="password" id="signupPassword" placeholder="Password (herufi 4+)">
        </div>
        <button class="btn" onclick="signup()">Jisajili</button>
        <button class="btn btn-secondary" onclick="showLogin()">Nyuma</button>
        <div id="signupError" class="error"></div>
    </div>
</div>

<script>
    async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        const res = await fetch('/api/login', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        const data = await res.json();
        if (data.success) window.location.href = '/';
        else document.getElementById('loginError').innerText = data.error;
    }
    
    async function signup() {
        const username = document.getElementById('signupUsername').value.trim();
        const password = document.getElementById('signupPassword').value.trim();
        
        const res = await fetch('/api/signup', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        const data = await res.json();
        if (data.success) window.location.href = '/';
        else document.getElementById('signupError').innerText = data.error;
    }
    
    function showSignup() {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('signupForm').classList.remove('hidden');
    }
    function showLogin() {
        document.getElementById('signupForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
    }
    
    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });
    document.getElementById('signupPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') signup();
    });
</script>
</body>
</html>
