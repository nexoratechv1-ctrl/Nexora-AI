<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', 'Inter', sans-serif;
            background: #0f0f13;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 900px;
            height: 100vh;
            background: #0f0f13;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: #0f0f13;
            flex-shrink: 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .logo-text {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }
        .message-ai {
            display: flex;
            justify-content: flex-start;
            animation: fadeIn 0.3s ease;
        }
        .ai-bubble {
            max-width: 90%;
            background: transparent;
            padding: 4px 0;
        }
        .ai-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .ai-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .ai-name {
            font-size: 0.8rem;
            font-weight: 500;
            color: #a1a1aa;
        }
        .speak-btn {
            background: rgba(168,85,247,0.15);
            border: 1px solid rgba(168,85,247,0.3);
            border-radius: 20px;
            padding: 5px 14px;
            color: #c084fc;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .ai-text {
            white-space: pre-wrap;
            word-break: break-word;
            margin-left: 38px;
            color: #e4e4e7;
            font-size: 0.95rem;
            line-height: 1.65;
        }
        .message-user {
            display: flex;
            justify-content: flex-end;
            animation: fadeIn 0.3s ease;
        }
        .user-bubble {
            max-width: 85%;
            background: #2a2a3a;
            border-radius: 24px;
            padding: 12px 18px;
            color: white;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .user-name {
            font-size: 0.7rem;
            color: #a1a1aa;
            margin-bottom: 6px;
            text-align: right;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            margin-left: 38px;
            padding: 8px 0;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #a855f7;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        .input-area {
            padding: 16px 20px 24px;
            background: #0f0f13;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            background: #1a1a24;
            border: 1px solid #2a2a3a;
            border-radius: 32px;
            padding: 14px 18px;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }
        .input-area input:focus {
            border-color: #a855f7;
        }
        .send-btn {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            border-radius: 32px;
            padding: 14px 28px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            min-width: 90px;
        }
        .reset-btn {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 32px;
            padding: 14px 24px;
            color: #f87171;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            .chat-area { padding: 16px; gap: 20px; }
            .ai-text { font-size: 0.9rem; margin-left: 36px; }
            .user-bubble { padding: 10px 14px; max-width: 90%; }
            .input-area { padding: 12px 16px 20px; gap: 10px; }
            .send-btn { padding: 12px 22px; font-size: 0.9rem; min-width: 80px; }
            .reset-btn { padding: 12px 18px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo">
            <div class="logo-icon">✦</div>
            <div class="logo-text">Nexora AI</div>
        </div>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="message-ai">
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" onclick="speakText(this, 'Habari! Tafadhali niambie jina lako. Mimi ni Nexora AI, nimetengenezwa na programmer mashuhuri Denis Albert, mwanafunzi wa St. Amedeus!')">🔊 Soma</button>
                </div>
                <div class="ai-text">Habari! Tafadhali niambie jina lako. Mimi ni Nexora AI, nimetengenezwa na programmer mashuhuri Denis Albert, mwanafunzi wa St. Amedeus! 😊🚀</div>
            </div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Andika ujumbe wako..." autocomplete="off">
        <button class="send-btn" id="sendBtn">📤 Tuma</button>
        <button class="reset-btn" id="resetBtn">🔄 Mpya</button>
    </div>
</div>

<script>
    let currentUserName = null;
    let isTyping = false;

    async function typeText(element, text, speed = 12) {
        element.innerHTML = '';
        for (let i = 0; i < text.length; i++) {
            element.innerHTML += text[i];
            await new Promise(r => setTimeout(r, speed));
        }
    }

    function speakText(button, text) {
        if (!window.speechSynthesis) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'sw';
        utterance.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
        
        const original = button.innerHTML;
        button.innerHTML = '🔊 Inasoma...';
        setTimeout(() => { button.innerHTML = original; }, 2000);
    }

    async function addAIMessage(text) {
        const chatArea = document.getElementById('chatArea');
        const messageId = 'msg_' + Date.now();
        const div = document.createElement('div');
        div.className = 'message-ai';
        div.id = messageId;
        div.innerHTML = `
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" onclick="speakText(this, \`${text.replace(/`/g, '\\`').replace(/\n/g, ' ')}\`)">🔊 Soma</button>
                </div>
                <div class="ai-text"></div>
            </div>
        `;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        await typeText(div.querySelector('.ai-text'), text, 10);
    }

    function addUserMessage(name, text) {
        const chatArea = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'message-user';
        div.innerHTML = `
            <div class="user-bubble">
                <div class="user-name">${escapeHtml(name)}</div>
                <div>${escapeHtml(text)}</div>
            </div>
        `;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function showTyping() {
        const chatArea = document.getElementById('chatArea');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message-ai';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="ai-bubble">
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        `;
        chatArea.appendChild(typingDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
        return typingDiv;
    }

    function removeTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        let msg = input.value.trim();
        if (!msg || isTyping) return;
        input.value = '';

        if (!currentUserName) {
            currentUserName = msg;
            addUserMessage(msg, msg);
            const reply = await fetchReply(msg, currentUserName);
            await addAIMessage(reply);
            return;
        }

        addUserMessage(currentUserName, msg);
        const typingDiv = await showTyping();
        isTyping = true;
        const reply = await fetchReply(msg, currentUserName);
        removeTyping();
        isTyping = false;
        await addAIMessage(reply);
    }

    async function fetchReply(message, userName) {
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, userName: userName })
            });
            const data = await response.json();
            return data.reply;
        } catch (error) {
            return "Samahani, kuna tatizo la muunganisho. Hakikisha server inaendesha kwenye port 5000. 😊";
        }
    }

    function resetConversation() {
        currentUserName = null;
        const chatArea = document.getElementById('chatArea');
        chatArea.innerHTML = '';
        const welcomeDiv = document.createElement('div');
        welcomeDiv.className = 'message-ai';
        welcomeDiv.innerHTML = `
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" onclick="speakText(this, 'Tafadhali niambie jina lako. Mimi ni Nexora AI, nimetengenezwa na Denis Albert, mwanafunzi wa St. Amedeus!')">🔊 Soma</button>
                </div>
                <div class="ai-text">Tafadhali niambie jina lako. Mimi ni Nexora AI, nimetengenezwa na programmer mashuhuri Denis Albert, mwanafunzi wa St. Amedeus! 😊🚀</div>
            </div>
        `;
        chatArea.appendChild(welcomeDiv);
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('resetBtn').addEventListener('click', resetConversation);
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
  </html>
