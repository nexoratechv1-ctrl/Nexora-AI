<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nexora AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', 'Inter', sans-serif;
            background: #0f0f13;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 900px;
            height: 100vh;
            background: #0f0f13;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: #0f0f13;
            flex-shrink: 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .logo-text {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .voice-badge {
            background: rgba(168,85,247,0.2);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            color: #c084fc;
            margin-left: 12px;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 10px; }
        
        .message-ai {
            display: flex;
            justify-content: flex-start;
            animation: fadeIn 0.3s ease;
        }
        .ai-bubble {
            max-width: 90%;
            background: transparent;
            padding: 4px 0;
        }
        .ai-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .ai-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .ai-name {
            font-size: 0.8rem;
            font-weight: 500;
            color: #a1a1aa;
        }
        .speak-btn {
            background: rgba(168,85,247,0.15);
            border: 1px solid rgba(168,85,247,0.3);
            border-radius: 20px;
            padding: 5px 14px;
            color: #c084fc;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .ai-text {
            white-space: pre-wrap;
            word-break: break-word;
            margin-left: 38px;
            color: #e4e4e7;
            font-size: 0.95rem;
            line-height: 1.65;
        }
        .message-user {
            display: flex;
            justify-content: flex-end;
            animation: fadeIn 0.3s ease;
        }
        .user-bubble {
            max-width: 85%;
            background: #2a2a3a;
            border-radius: 24px;
            padding: 12px 18px;
            color: white;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .user-name {
            font-size: 0.7rem;
            color: #a1a1aa;
            margin-bottom: 6px;
            text-align: right;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            margin-left: 38px;
            padding: 8px 0;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #a855f7;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        .input-area {
            padding: 16px 20px 24px;
            background: #0f0f13;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            background: #1a1a24;
            border: 1px solid #2a2a3a;
            border-radius: 20px;
            padding: 14px 18px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            font-family: inherit;
            line-height: 1.4;
        }
        .input-area textarea:focus {
            border-color: #a855f7;
            background: #1f1f2a;
        }
        .input-area textarea::placeholder {
            color: #5a5a6e;
        }
        .send-btn {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            border-radius: 32px;
            padding: 14px 24px;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            height: 52px;
        }
        .voice-btn {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.4);
            border-radius: 32px;
            padding: 14px 20px;
            color: #4ade80;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            height: 52px;
        }
        .voice-btn.listening {
            background: rgba(239, 68, 68, 0.3);
            border-color: #ef4444;
            color: #f87171;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .reset-btn {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 32px;
            padding: 14px 20px;
            color: #f87171;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            height: 52px;
        }
        @media (max-width: 600px) {
            .chat-area { padding: 16px; gap: 20px; }
            .ai-text { font-size: 0.9rem; margin-left: 36px; }
            .user-bubble { padding: 10px 14px; max-width: 90%; }
            .input-area { padding: 12px 16px 20px; gap: 8px; }
            .send-btn, .voice-btn, .reset-btn { padding: 10px 16px; font-size: 0.8rem; height: 48px; }
            .input-area textarea { padding: 12px 14px; font-size: 0.85rem; }
            .voice-btn span { display: none; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo">
            <div class="logo-icon">✦</div>
            <div class="logo-text">Nexora AI</div>
            <div class="voice-badge">🎤 Voice + Multi-Line</div>
        </div>
    </div>
    <div class="chat-area" id="chatArea">
        <div class="message-ai">
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" onclick="speakText(this, 'Habari! Tafadhali niambie jina lako. Unaweza kuandika kwenye sanduku kubwa na kupata Enter kwa mistari mingi!')">🔊 Soma</button>
                </div>
                <div class="ai-text">Habari! Tafadhali niambie jina lako. 🎤 Unaweza kuandika kwenye sanduku kubwa na kupata Enter kwa mistari mingi! 😊🚀</div>
            </div>
        </div>
    </div>
    <div class="input-area">
        <textarea id="userInput" placeholder="Andika ujumbe wako...&#10;💡 Kidokezo: Unaweza kuweka mafundisho mengi kwa kuandika kila moja kwenye mstari wake!" rows="3"></textarea>
        <button class="send-btn" id="sendBtn">📤 Tuma</button>
        <button class="voice-btn" id="voiceBtn" title="Bonyeza kuongea">🎤 <span>Sauti</span></button>
        <button class="reset-btn" id="resetBtn">🔄 Mpya</button>
    </div>
</div>

<script>
    let currentUserName = null;
    let isTyping = false;
    let isListening = false;
    let recognition = null;

    // Auto-resize textarea
    const textarea = document.getElementById('userInput');
    textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });

    // Speech Recognition
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'sw-TZ';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onresult = function(event) {
            const speechText = event.results[0][0].transcript;
            textarea.value = speechText;
            document.getElementById('voiceBtn').classList.remove('listening');
            isListening = false;
            document.getElementById('voiceBtn').innerHTML = '🎤 <span>Sauti</span>';
            // Auto send after voice
            sendMessage();
        };

        recognition.onerror = function() {
            document.getElementById('voiceBtn').classList.remove('listening');
            isListening = false;
            document.getElementById('voiceBtn').innerHTML = '🎤 <span>Sauti</span>';
        };
    }

    function startListening() {
        if (!recognition) {
            addAIMessage("Samahani, kifaa chako hakina uwezo wa kutambua sauti. 😊");
            return;
        }
        if (isListening) {
            recognition.stop();
            document.getElementById('voiceBtn').classList.remove('listening');
            isListening = false;
            document.getElementById('voiceBtn').innerHTML = '🎤 <span>Sauti</span>';
        } else {
            recognition.start();
            isListening = true;
            document.getElementById('voiceBtn').classList.add('listening');
            document.getElementById('voiceBtn').innerHTML = '🎤 <span>Inasikiliza...</span>';
        }
    }

    document.getElementById('voiceBtn').addEventListener('click', startListening);

    function speakText(button, text) {
        if (!window.speechSynthesis) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'sw';
        utterance.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
        const original = button.innerHTML;
        button.innerHTML = '🔊 Inasoma...';
        setTimeout(() => { button.innerHTML = original; }, 2000);
    }

    async function typeText(element, text, speed = 12) {
        element.innerHTML = '';
        for (let i = 0; i < text.length; i++) {
            element.innerHTML += text[i];
            await new Promise(r => setTimeout(r, speed));
        }
    }

    async function addAIMessage(text) {
        const chatArea = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'message-ai';
        div.innerHTML = `
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" onclick="speakText(this, \`${text.replace(/`/g, '\\`').replace(/\n/g, ' ')}\`)">🔊 Soma</button>
                </div>
                <div class="ai-text"></div>
            </div>
        `;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        await typeText(div.querySelector('.ai-text'), text, 10);
    }

    function addUserMessage(name, text) {
        const chatArea = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'message-user';
        div.innerHTML = `
            <div class="user-bubble">
                <div class="user-name">${escapeHtml(name)}</div>
                <div>${escapeHtml(text)}</div>
            </div>
        `;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function showTyping() {
        const chatArea = document.getElementById('chatArea');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message-ai';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="ai-bubble">
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        `;
        chatArea.appendChild(typingDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
        return typingDiv;
    }

    function removeTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    async function fetchReply(message, userName) {
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, userName: userName })
            });
            const data = await response.json();
            return data.reply;
        } catch (error) {
            return "Samahani, kuna tatizo. Hakikisha server inaendesha. 😊";
        }
    }

    async function sendMessage() {
        let msg = textarea.value.trim();
        if (!msg || isTyping) return;
        textarea.value = '';
        textarea.style.height = 'auto';

        if (!currentUserName) {
            currentUserName = msg;
            addUserMessage(msg, msg);
            const reply = await fetchReply(msg, currentUserName);
            await addAIMessage(reply);
            return;
        }

        addUserMessage(currentUserName, msg);
        const typingDiv = await showTyping();
        isTyping = true;
        const reply = await fetchReply(msg, currentUserName);
        removeTyping();
        isTyping = false;
        await addAIMessage(reply);
    }

    function resetConversation() {
        currentUserName = null;
        const chatArea = document.getElementById('chatArea');
        chatArea.innerHTML = '';
        const welcomeDiv = document.createElement('div');
        welcomeDiv.className = 'message-ai';
        welcomeDiv.innerHTML = `
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" onclick="speakText(this, 'Tafadhali niambie jina lako kuanza.')">🔊 Soma</button>
                </div>
                <div class="ai-text">Tafadhali niambie jina lako kuanza. 😊🚀</div>
            </div>
        `;
        chatArea.appendChild(welcomeDiv);
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('resetBtn').addEventListener('click', resetConversation);
    
    // Ctrl+Enter to send
    textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.ctrlKey) {
            sendMessage();
        }
    });
</script>
</body>
        </html>
