<!DOCTYPE html>
<html lang="sw">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#a855f7">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nexora AI</title>
    
    <!-- PWA Manifest and Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#a855f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nexora AI">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', 'Inter', sans-serif;
            background: #0f0f13;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            height: 100vh;
            background: #0f0f13;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: #0f0f13;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logout-btn {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 20px;
            padding: 8px 16px;
            color: #f87171;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 10px; }

        /* AI Message */
        .message-ai {
            display: flex;
            justify-content: flex-start;
            animation: fadeIn 0.3s ease;
        }

        .ai-bubble {
            max-width: 90%;
            background: transparent;
            padding: 4px 0;
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .ai-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .ai-name {
            font-size: 0.8rem;
            font-weight: 500;
            color: #a1a1aa;
        }

        .speak-btn {
            background: rgba(168,85,247,0.15);
            border: 1px solid rgba(168,85,247,0.3);
            border-radius: 20px;
            padding: 5px 14px;
            color: #c084fc;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .ai-text {
            white-space: pre-wrap;
            word-break: break-word;
            margin-left: 38px;
            color: #e4e4e7;
            font-size: 0.95rem;
            line-height: 1.65;
        }

        /* User Message */
        .message-user {
            display: flex;
            justify-content: flex-end;
            animation: fadeIn 0.3s ease;
        }

        .user-bubble {
            max-width: 85%;
            background: #2a2a3a;
            border-radius: 24px;
            padding: 12px 18px;
            color: white;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .user-name {
            font-size: 0.7rem;
            color: #a1a1aa;
            margin-bottom: 6px;
            text-align: right;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            margin-left: 38px;
            padding: 8px 0;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #a855f7;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Input Area */
        .input-wrapper {
            padding: 16px 20px 24px;
            background: #0f0f13;
            border-top: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: #1a1a24;
            border: 1px solid #2a2a3a;
            border-radius: 28px;
            padding: 8px 12px;
            transition: all 0.2s;
        }

        .input-container:focus-within {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168,85,247,0.2);
        }

        .input-container textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 4px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            font-family: inherit;
            line-height: 1.5;
            min-height: 28px;
            max-height: 120px;
        }

        .input-container textarea::placeholder {
            color: #5a5a6e;
        }

        .icon-btn {
            background: transparent;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .mic-btn {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .mic-btn:hover {
            background: rgba(74, 222, 128, 0.2);
        }

        .mic-btn.listening {
            background: rgba(239, 68, 68, 0.3);
            color: #f87171;
            animation: pulseMic 1.5s infinite;
        }

        @keyframes pulseMic {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .new-btn {
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
        }

        .new-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .send-btn {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            border-radius: 28px;
            padding: 8px 20px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            height: 36px;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            .chat-area { padding: 16px; gap: 20px; }
            .ai-text { font-size: 0.9rem; margin-left: 36px; }
            .user-bubble { padding: 10px 14px; max-width: 90%; }
            .input-wrapper { padding: 12px 16px 20px; }
            .icon-btn { width: 32px; height: 32px; font-size: 1rem; }
            .send-btn { padding: 6px 16px; font-size: 0.8rem; height: 32px; }
        }
    </style>
    
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered:', reg))
                    .catch(err => console.log('Service Worker error:', err));
            });
        }
        
        // Logout function
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        }
    </script>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo">
            <div class="logo-icon">✦</div>
            <div class="logo-text">Nexora AI</div>
        </div>
        <button class="logout-btn" onclick="logout()">🚪 Toka</button>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message-ai">
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" id="welcomeSpeakBtn">🔊 Soma</button>
                </div>
                <div class="ai-text">Habari! Tafadhali niambie jina lako. Mimi ni Nexora AI, nimetengenezwa na Denis Albert, programmer mashuhuri na mwanafunzi wa St. Amedeus. 😊🚀</div>
            </div>
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <textarea id="userInput" placeholder="Andika ujumbe wako..." rows="1"></textarea>
            <button class="icon-btn mic-btn" id="voiceBtn" title="Bonyeza kuongea">🎤</button>
            <button class="icon-btn new-btn" id="resetBtn" title="Anza mazungumzo mpya">🔄</button>
            <button class="send-btn" id="sendBtn">Tuma</button>
        </div>
    </div>
</div>

<script>
    let currentUserName = null;
    let isTyping = false;
    let isListening = false;
    let recognition = null;

    // Auto-resize textarea
    const textarea = document.getElementById('userInput');
    function autoResize() {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }
    textarea.addEventListener('input', autoResize);
    
    textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Speech Recognition
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'sw-TZ';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onresult = function(event) {
            const speechText = event.results[0][0].transcript;
            textarea.value = speechText;
            autoResize();
            document.getElementById('voiceBtn').classList.remove('listening');
            isListening = false;
            sendMessage();
        };

        recognition.onerror = function() {
            document.getElementById('voiceBtn').classList.remove('listening');
            isListening = false;
        };
    }

    function startListening() {
        if (!recognition) {
            addAIMessage("Samahani, kifaa chako hakina uwezo wa kutambua sauti. 😊");
            return;
        }
        if (isListening) {
            recognition.stop();
            document.getElementById('voiceBtn').classList.remove('listening');
            isListening = false;
        } else {
            recognition.start();
            isListening = true;
            document.getElementById('voiceBtn').classList.add('listening');
        }
    }

    document.getElementById('voiceBtn').addEventListener('click', startListening);

    // Text-to-Speech
    function speakText(button, text) {
        if (!window.speechSynthesis) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'sw';
        utterance.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
        const original = button.innerHTML;
        button.innerHTML = '🔊 Inasoma...';
        setTimeout(() => { button.innerHTML = original; }, 2000);
    }

    document.getElementById('welcomeSpeakBtn').onclick = function() {
        const welcomeText = document.querySelector('.ai-text').innerText;
        speakText(this, welcomeText);
    };

    // Type effect
    async function typeText(element, text, speed = 12) {
        element.innerHTML = '';
        for (let i = 0; i < text.length; i++) {
            element.innerHTML += text[i];
            await new Promise(r => setTimeout(r, speed));
        }
    }

    async function addAIMessage(text) {
        const chatArea = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'message-ai';
        div.innerHTML = `
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" onclick="speakText(this, \`${text.replace(/`/g, '\\`').replace(/\n/g, ' ')}\`)">🔊 Soma</button>
                </div>
                <div class="ai-text"></div>
            </div>
        `;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        await typeText(div.querySelector('.ai-text'), text, 10);
    }

    function addUserMessage(name, text) {
        const chatArea = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'message-user';
        div.innerHTML = `
            <div class="user-bubble">
                <div class="user-name">${escapeHtml(name)}</div>
                <div>${escapeHtml(text)}</div>
            </div>
        `;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function showTyping() {
        const chatArea = document.getElementById('chatArea');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message-ai';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="ai-bubble">
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        `;
        chatArea.appendChild(typingDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
        return typingDiv;
    }

    function removeTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    async function fetchReply(message, userName) {
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, userName: userName })
            });
            const data = await response.json();
            return data.reply;
        } catch (error) {
            return "Samahani, kuna tatizo. 😊";
        }
    }

    async function sendMessage() {
        let msg = textarea.value.trim();
        if (!msg || isTyping) return;
        textarea.value = '';
        autoResize();

        if (!currentUserName) {
            currentUserName = msg;
            addUserMessage(msg, msg);
            const reply = await fetchReply(msg, currentUserName);
            await addAIMessage(reply);
            return;
        }

        addUserMessage(currentUserName, msg);
        const typingDiv = await showTyping();
        isTyping = true;
        const reply = await fetchReply(msg, currentUserName);
        removeTyping();
        isTyping = false;
        await addAIMessage(reply);
    }

    function resetConversation() {
        currentUserName = null;
        const chatArea = document.getElementById('chatArea');
        chatArea.innerHTML = '';
        const welcomeDiv = document.createElement('div');
        welcomeDiv.className = 'message-ai';
        welcomeDiv.innerHTML = `
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" onclick="speakText(this, 'Tafadhali niambie jina lako kuanza.')">🔊 Soma</button>
                </div>
                <div class="ai-text">Tafadhali niambie jina lako kuanza. 😊🚀</div>
            </div>
        `;
        chatArea.appendChild(welcomeDiv);
        textarea.value = '';
        autoResize();
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('resetBtn').addEventListener('click', resetConversation);
</script>
</body>
    </html>
