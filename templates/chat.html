<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nexora AI</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#a855f7">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, 'Segoe UI', 'Inter', sans-serif;
            background: #0f0f13;
        }

        /* MAIN CONTAINER */
        .app-container {
            width: 100%;
            height: 100%;
            max-width: 1000px;
            margin: 0 auto;
            background: #0f0f13;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: #0f0f13;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logout-btn {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 20px;
            padding: 6px 14px;
            color: #f87171;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(239,68,68,0.25);
        }

        /* AVATAR SECTION */
        .avatar-section {
            display: flex;
            justify-content: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
        }

        .avatar-container {
            text-align: center;
        }

        .avatar-img {
            width: 55px;
            height: 55px;
            margin: 0 auto;
        }

        .avatar-img svg {
            width: 100%;
            height: 100%;
        }

        .avatar-name {
            color: #c084fc;
            font-size: 0.7rem;
            margin-top: 5px;
        }

        /* CHAT AREA */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 5px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 10px;
        }

        /* AI MESSAGE */
        .message-ai {
            display: flex;
            justify-content: flex-start;
            animation: fadeIn 0.3s ease;
        }

        .ai-bubble {
            max-width: 85%;
            background: transparent;
            padding: 2px 0;
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .ai-avatar {
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .ai-name {
            font-size: 0.8rem;
            font-weight: 500;
            color: #a1a1aa;
        }

        .speak-btn {
            background: rgba(168,85,247,0.12);
            border: 1px solid rgba(168,85,247,0.25);
            border-radius: 18px;
            padding: 3px 10px;
            color: #c084fc;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .speak-btn:hover {
            background: rgba(168,85,247,0.2);
        }

        .ai-text {
            white-space: pre-wrap;
            word-break: break-word;
            margin-left: 34px;
            color: #e4e4e7;
            font-size: 0.95rem;
            line-height: 1.65;
        }

        /* USER MESSAGE */
        .message-user {
            display: flex;
            justify-content: flex-end;
            animation: fadeIn 0.3s ease;
        }

        .user-bubble {
            max-width: 80%;
            background: #2a2a3a;
            border-radius: 22px;
            padding: 10px 16px;
            color: white;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .user-name {
            font-size: 0.7rem;
            color: #a1a1aa;
            margin-bottom: 5px;
            text-align: right;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TYPING INDICATOR */
        .typing-indicator {
            display: flex;
            gap: 4px;
            margin-left: 34px;
            padding: 8px 0;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #a855f7;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* INPUT AREA - KAMA DEEPSEEK 70% */
        .input-wrapper {
            padding: 16px 20px 20px;
            background: #0f0f13;
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: #1a1a24;
            border: 1px solid #2a2a3a;
            border-radius: 32px;
            padding: 8px 16px;
            transition: all 0.2s;
        }

        .input-container:focus-within {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168,85,247,0.15);
        }

        .input-container textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: white;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            font-family: inherit;
            line-height: 1.5;
            min-height: 28px;
            max-height: 120px;
        }

        .input-container textarea::placeholder {
            color: #5a5a6e;
        }

        /* BUTTONS */
        .action-btn {
            background: transparent;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .mic-btn {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.08);
        }

        .mic-btn:hover {
            background: rgba(74, 222, 128, 0.15);
        }

        .mic-btn.listening {
            background: rgba(239, 68, 68, 0.25);
            color: #f87171;
            animation: pulseMic 1.5s infinite;
        }

        .stop-btn {
            color: #f87171;
            background: rgba(239, 68, 68, 0.08);
        }

        .stop-btn:hover {
            background: rgba(239, 68, 68, 0.15);
        }

        @keyframes pulseMic {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .send-btn {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            border-radius: 28px;
            padding: 8px 22px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            height: 36px;
            flex-shrink: 0;
            transition: transform 0.1s;
        }

        .send-btn:active {
            transform: scale(0.96);
        }

        /* RESPONSIVE - SIMU */
        @media (max-width: 600px) {
            .header {
                padding: 10px 16px;
            }
            .logo-text {
                font-size: 1rem;
            }
            .logout-btn {
                padding: 5px 12px;
                font-size: 0.7rem;
            }
            .chat-area {
                padding: 16px;
                gap: 20px;
            }
            .ai-text {
                font-size: 0.9rem;
                margin-left: 30px;
            }
            .user-bubble {
                padding: 8px 14px;
                font-size: 0.9rem;
                max-width: 88%;
            }
            .input-wrapper {
                padding: 12px 16px 16px;
            }
            .input-container {
                gap: 6px;
                padding: 6px 12px;
            }
            .input-container textarea {
                font-size: 0.9rem;
                padding: 8px 0;
            }
            .action-btn {
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
            .send-btn {
                padding: 6px 16px;
                font-size: 0.8rem;
                height: 32px;
            }
            .avatar-img {
                width: 48px;
                height: 48px;
            }
            .avatar-name {
                font-size: 0.65rem;
            }
        }

        /* DESKTOP */
        @media (min-width: 901px) {
            .app-container {
                height: 95vh;
                border-radius: 24px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.4);
                overflow: hidden;
                margin-top: 2.5vh;
            }
            .chat-area {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo">
            <div class="logo-icon">✦</div>
            <div class="logo-text">Nexora AI</div>
        </div>
        <button class="logout-btn" onclick="logout()">🚪 Toka</button>
    </div>

    <!-- AVATAR -->
    <div class="avatar-section">
        <div class="avatar-container">
            <div id="avatarImage" class="avatar-img">
                <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="100" r="90" fill="#1a1a3a" stroke="#a855f7" stroke-width="2.5"/>
                    <ellipse cx="70" cy="85" rx="14" ry="16" fill="white"/>
                    <circle cx="74" cy="88" r="7" fill="#a855f7"/>
                    <ellipse cx="130" cy="85" rx="14" ry="16" fill="white"/>
                    <circle cx="134" cy="88" r="7" fill="#a855f7"/>
                    <path d="M55 68 Q70 60 85 68" stroke="#c084fc" stroke-width="2.5" fill="none"/>
                    <path d="M115 68 Q130 60 145 68" stroke="#c084fc" stroke-width="2.5" fill="none"/>
                    <path d="M100 92 L97 105 L103 105 Z" fill="#3a3a5a"/>
                    <ellipse id="avatarMouth" cx="100" cy="125" rx="16" ry="7" fill="#ff6b6b"/>
                </svg>
            </div>
            <div class="avatar-name">Nexora AI <span id="avatarStatus">😊</span></div>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">
        <div class="message-ai">
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" id="welcomeSpeakBtn">🔊 Soma</button>
                </div>
                <div class="ai-text">Habari! Tafadhali niambie jina lako. Mimi ni Nexora AI. 😊🚀</div>
            </div>
        </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-wrapper">
        <div class="input-container">
            <textarea id="userInput" placeholder="Andika ujumbe wako... (Shift+Enter kwa mstari mpya)" rows="1"></textarea>
            <button class="action-btn mic-btn" id="voiceBtn" title="Bonyeza kuongea">🎤</button>
            <button class="action-btn stop-btn" id="stopBtn" title="Sitisha mazungumzo">⏹️</button>
            <button class="send-btn" id="sendBtn">Tuma</button>
        </div>
    </div>
</div>

<script>
    let currentUserName = null;
    let isTyping = false;
    let isListening = false;
    let isAISpeaking = false;
    let currentUtterance = null;
    let recognition = null;
    let mouthAnimationInterval = null;
    let isMouthAnimating = false;

    const textarea = document.getElementById('userInput');
    const voiceBtn = document.getElementById('voiceBtn');
    const stopBtn = document.getElementById('stopBtn');

    // AUTO RESIZE TEXTAREA
    function autoResize() {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }
    textarea.addEventListener('input', autoResize);

    // SHIFT+ENTER KWA MSTARI MPYA, ENTER TU KUTUMA
    textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (e.shiftKey) {
                // Shift+Enter = mstari mpya (kawaida)
                return;
            } else {
                // Enter tu = tunza ujumbe
                e.preventDefault();
                sendMessage();
            }
        }
    });

    function startTalkingAnimation() {
        if (mouthAnimationInterval) clearInterval(mouthAnimationInterval);
        isMouthAnimating = true;
        document.getElementById('avatarStatus').innerHTML = '🔊...';
        const mouth = document.querySelector('#avatarImage svg ellipse');
        let step = 0;
        mouthAnimationInterval = setInterval(() => {
            if (!isMouthAnimating) return;
            if (mouth) {
                const ry = step % 2 === 0 ? 12 : 4;
                mouth.setAttribute('ry', ry);
            }
            step++;
        }, 120);
    }

    function stopTalkingAnimation() {
        isMouthAnimating = false;
        if (mouthAnimationInterval) {
            clearInterval(mouthAnimationInterval);
            mouthAnimationInterval = null;
        }
        const mouth = document.querySelector('#avatarImage svg ellipse');
        if (mouth) mouth.setAttribute('ry', 7);
        document.getElementById('avatarStatus').innerHTML = '😊';
    }

    function speakText(button, text) {
        if (isAISpeaking) {
            if (currentUtterance) window.speechSynthesis.cancel();
            isAISpeaking = false;
            stopTalkingAnimation();
            if (button) button.innerHTML = '🔊 Soma';
            return;
        }
        
        if (!window.speechSynthesis) return;
        
        startTalkingAnimation();
        isAISpeaking = true;
        if (button) button.innerHTML = '⏹️ Sitisha';
        
        currentUtterance = new SpeechSynthesisUtterance(text);
        currentUtterance.lang = 'sw';
        currentUtterance.rate = 0.9;
        currentUtterance.onend = () => {
            isAISpeaking = false;
            stopTalkingAnimation();
            if (button) button.innerHTML = '🔊 Soma';
            currentUtterance = null;
        };
        currentUtterance.onerror = () => {
            isAISpeaking = false;
            stopTalkingAnimation();
            if (button) button.innerHTML = '🔊 Soma';
            currentUtterance = null;
        };
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(currentUtterance);
    }

    stopBtn.addEventListener('click', () => {
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
            isAISpeaking = false;
            stopTalkingAnimation();
            const allSpeakBtns = document.querySelectorAll('.speak-btn');
            allSpeakBtns.forEach(btn => {
                if (btn.innerHTML.includes('Sitisha') || btn.innerHTML.includes('Inasoma')) {
                    btn.innerHTML = '🔊 Soma';
                }
            });
        }
        if (recognition && isListening) {
            recognition.stop();
            isListening = false;
            voiceBtn.classList.remove('listening');
            voiceBtn.innerHTML = '🎤';
        }
        isTyping = false;
        const typingIndicator = document.getElementById('typingIndicator');
        if (typingIndicator) typingIndicator.remove();
    });

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'sw-TZ';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = () => {
            isListening = true;
            voiceBtn.classList.add('listening');
            voiceBtn.innerHTML = '🔴';
        };

        recognition.onresult = (event) => {
            const speechText = event.results[0][0].transcript;
            textarea.value = speechText;
            autoResize();
            sendMessage();
        };

        recognition.onerror = () => {
            isListening = false;
            voiceBtn.classList.remove('listening');
            voiceBtn.innerHTML = '🎤';
        };

        recognition.onend = () => {
            isListening = false;
            voiceBtn.classList.remove('listening');
            voiceBtn.innerHTML = '🎤';
        };
    }

    voiceBtn.addEventListener('click', () => {
        if (!recognition) {
            addAIMessage("Samahani, kifaa chako hakina uwezo wa kutambua sauti. 😊");
            return;
        }
        if (isListening) {
            recognition.stop();
        } else {
            recognition.start();
        }
    });

    async function typeText(element, text, speed = 10) {
        element.innerHTML = '';
        for (let i = 0; i < text.length; i++) {
            element.innerHTML += text[i];
            await new Promise(r => setTimeout(r, speed));
        }
    }

    async function addAIMessage(text) {
        const chatArea = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'message-ai';
        div.innerHTML = `
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" onclick="speakText(this, \`${text.replace(/`/g, '\\`').replace(/\n/g, ' ')}\`)">🔊 Soma</button>
                </div>
                <div class="ai-text"></div>
            </div>
        `;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        await typeText(div.querySelector('.ai-text'), text, 8);
    }

    function addUserMessage(name, text) {
        const chatArea = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'message-user';
        div.innerHTML = `<div class="user-bubble"><div class="user-name">${escapeHtml(name)}</div><div>${escapeHtml(text)}</div></div>`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function showTyping() {
        const chatArea = document.getElementById('chatArea');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message-ai';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `<div class="ai-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
        chatArea.appendChild(typingDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
        return typingDiv;
    }

    function removeTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    async function fetchReply(message, userName) {
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, userName: userName })
            });
            const data = await response.json();
            return data.reply;
        } catch (error) {
            return "Samahani, kuna tatizo la mtandao. 😊";
        }
    }

    async function sendMessage() {
        let msg = textarea.value.trim();
        if (!msg || isTyping) return;
        textarea.value = '';
        autoResize();

        if (!currentUserName) {
            currentUserName = msg;
            addUserMessage(msg, msg);
            const reply = await fetchReply(msg, currentUserName);
            await addAIMessage(reply);
            return;
        }

        addUserMessage(currentUserName, msg);
        const typingDiv = await showTyping();
        isTyping = true;
        const reply = await fetchReply(msg, currentUserName);
        removeTyping();
        isTyping = false;
        await addAIMessage(reply);
    }

    async function logout() {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/';
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('welcomeSpeakBtn').onclick = function() {
        const welcomeText = document.querySelector('.ai-text').innerText;
        speakText(this, welcomeText);
    };
</script>
</body>
</html>
