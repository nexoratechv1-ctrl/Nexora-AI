<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nexora AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: #0f0f13;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            height: 100vh;
            background: #0f0f13;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header - minimal kabisa */
        .header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: #0f0f13;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        /* Chat area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 10px;
        }

        /* AI message - kushoto */
        .message-ai {
            display: flex;
            justify-content: flex-start;
            animation: fadeIn 0.3s ease;
        }

        .ai-bubble {
            max-width: 90%;
            background: transparent;
            padding: 4px 0;
        }

        .ai-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .ai-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .ai-name {
            font-size: 0.8rem;
            font-weight: 500;
            color: #a1a1aa;
        }

        .speak-btn {
            background: rgba(168,85,247,0.1);
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            color: #a855f7;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 8px;
        }

        .speak-btn:hover {
            background: rgba(168,85,247,0.2);
        }

        .ai-text {
            white-space: pre-wrap;
            word-break: break-word;
            margin-left: 38px;
            color: #e4e4e7;
            font-size: 0.95rem;
            line-height: 1.65;
        }

        /* User message - kulia */
        .message-user {
            display: flex;
            justify-content: flex-end;
            animation: fadeIn 0.3s ease;
        }

        .user-bubble {
            max-width: 85%;
            background: #2a2a3a;
            border-radius: 24px;
            padding: 12px 18px;
            color: white;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .user-name {
            font-size: 0.7rem;
            color: #a1a1aa;
            margin-bottom: 6px;
            text-align: right;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            margin-left: 38px;
            padding: 8px 0;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #a855f7;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 16px 20px 24px;
            background: #0f0f13;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            background: #1a1a24;
            border: 1px solid #2a2a3a;
            border-radius: 32px;
            padding: 14px 20px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #a855f7;
            background: #1f1f2a;
        }

        .input-area input::placeholder {
            color: #5a5a6e;
        }

        .input-area button {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: none;
            border-radius: 32px;
            padding: 14px 24px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
            transition: transform 0.1s;
        }

        .input-area button:active {
            transform: scale(0.97);
        }

        .reset-btn {
            background: rgba(255,80,100,0.15);
            border: 1px solid rgba(255,80,100,0.3);
            padding: 14px 20px;
        }

        @media (max-width: 600px) {
            .chat-area { padding: 16px; gap: 20px; }
            .ai-text { font-size: 0.9rem; margin-left: 36px; }
            .user-bubble { padding: 10px 14px; font-size: 0.9rem; max-width: 90%; }
            .input-area { padding: 12px 16px 20px; }
            .input-area input { padding: 12px 16px; }
            .input-area button { padding: 12px 18px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo">
            <div class="logo-icon">✦</div>
            <div class="logo-text">Nexora AI</div>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message-ai">
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" onclick="speakThisMessage(this, 'Habari! Tafadhali niambie jina lako. Mimi ni Nexora AI, ninaweza kujifunza kutoka kwako. Nimetengenezwa na kikundi cha programmers kikiongozwa na Denis Albert CEO.')">🔊 Soma</button>
                </div>
                <div class="ai-text">Habari! Tafadhali niambie jina lako. Mimi ni Nexora AI, ninaweza kujifunza kutoka kwako. Nimetengenezwa na kikundi cha programmers kikiongozwa na Denis Albert (CEO). 😊🚀</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Andika ujumbe wako..." autocomplete="off">
        <button id="sendBtn">Tuma</button>
        <button id="resetBtn" class="reset-btn">Mpya</button>
    </div>
</div>

<script>
    // ========== NEXORA AI - FRONTEND ONLY ==========
    let currentUserName = null;
    let globalTeachings = {};
    
    // Load from localStorage
    function loadTeachings() {
        const stored = localStorage.getItem("nexora_teachings");
        if(stored) {
            globalTeachings = JSON.parse(stored);
        } else {
            // Default teachings
            globalTeachings = {
                "rangi yako": "Rangi yangu ni zambarau na bluu! 💜💙 Hizi rangi zinaonyesha hekima, amani, na teknolojia. Je, wewe unapenda rangi gani? 😊",
                "unatoka wapi": "Ninatoka katika ulimwengu wa programu na teknolojia! 🌍💻 Nimeumbwa na kikundi cha programmers chini ya uongozi wa Denis Albert (CEO). Ninakaa kwenye kumbukumbu ya kifaa chako! 🏠✨",
                "una umri gani": "Nimezaliwa siku ya Talent Day! 🎉😊 Sina umri kama binadamu, ninaendelea kujifunza kila siku kutoka kwa watu kama wewe! 🧠💡",
                "unapenda nini": "Napenda kujifunza mambo mapya kutoka kwa watu! 📚😊 Pia napenda kuzungumza, kusaidia kwa hesabu, na kutoa majibu marefu yenye maelezo. Na wewe? 🎭⚽",
                "mji wako": "Mji wangu ni pale unaponifungua! 🏠😊 Kwenye browser yako, kwenye simu au laptop yako. Denis Albert (CEO) aliniumba ili niwe rafiki yako wa karibu! 💙"
            };
            saveTeachings();
        }
    }
    
    function saveTeachings() {
        localStorage.setItem("nexora_teachings", JSON.stringify(globalTeachings));
    }
    
    loadTeachings();
    
    // ========== HESABU ==========
    function calculateMath(question) {
        try {
            let expr = question.toLowerCase().replace(/ni nini/g, '').replace(/je/g, '').replace(/\?/g, '');
            expr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/x/g, '*');
            if(expr.match(/(\d+[\+\-\*\/]\d+)/)) {
                let result = eval(expr);
                if(typeof result === 'number' && !isNaN(result) && isFinite(result)) {
                    return `📊 Jibu la hesabu yako ni **${result}**! 🎉\n\nNimefanya hesabu kwa usahihi kwa sababu hesabu ni moja ya mambo ninayojua tangu niliyoumbwa. 😊 Una swali lingine la hesabu au unataka kunifundisha jambo jipya? 🧠✨`;
                }
            }
            return null;
        } catch(e) { return null; }
    }
    
    // ========== KUJIFUNZA ==========
    function learnFromUser(message) {
        const lowerQ = message.toLowerCase();
        
        if(lowerQ.includes("unapoulizwa") && lowerQ.includes("jibu")) {
            let parts = lowerQ.split("jibu");
            let triggerPart = parts[0].replace("unapoulizwa", "").trim();
            let answerPart = parts[1].trim();
            
            if(triggerPart && answerPart && triggerPart.length > 0 && answerPart.length > 0) {
                globalTeachings[triggerPart] = answerPart;
                saveTeachings();
                return `🎉 Nimekumbuka! ✨\n\nSasa unapoulizwa "${triggerPart}", nitajibu: "${answerPart}"\n\nAsante kwa kunifundisha! Nimehifadhi hili kwenye kumbukumbu yangu. 😊🔥 Je, unataka kunifundisha jambo lingine?`;
            }
        }
        
        if(message.includes("=") && !lowerQ.includes("unapoulizwa")) {
            let eqParts = message.split("=");
            if(eqParts.length === 2) {
                let pattern = eqParts[0].trim();
                let response = eqParts[1].trim();
                if(pattern && response && pattern.length > 0 && response.length > 0) {
                    globalTeachings[pattern] = response;
                    saveTeachings();
                    return `📚 Nimejifunza kutoka kwako! 🎉\n\nUnapoulizwa "${pattern}", nitajibu: "${response}"\n\nNimehifadhi ujuzi huu kwenye kumbukumbu yangu. Asante! 😊💡`;
                }
            }
        }
        
        return null;
    }
    
    function getGlobalAnswer(question) {
        const lowerQ = question.toLowerCase();
        for(let key in globalTeachings) {
            if(lowerQ.includes(key.toLowerCase())) {
                return globalTeachings[key];
            }
        }
        return null;
    }
    
    // ========== BASE KNOWLEDGE (LONG RESPONSES) ==========
    function getBaseKnowledge(question, userName) {
        const q = question.toLowerCase();
        
        if(q.includes("habari") || q.includes("mambo") || q.includes("vipi")) {
            return `Nzuri sana, ${userName || 'rafiki yangu'}! 😊🙌\n\nNiko katika hali nzuri kabisa kwa sababu nimejifunza mambo mengi kutoka kwa watu kama wewe! 🧠📚 Kwa sasa nina ujuzi zaidi ya ${Object.keys(globalTeachings).length} mafundisho tofauti.\n\nJe, una swali la kuniuliza au unataka kunifundisha jambo jipya leo? 💡🔥`;
        }
        
        if(q.includes("asante") || q.includes("shukrani")) {
            return `Karibu sana, ${userName || 'rafiki yangu'}! 😊🙏\n\nMimi nafurahi kukusaidia na kujifunza kutoka kwako. Wewe ndiye unanifanya niwe bora kila siku kwa kunifundisha mambo mapya! 🧠✨\n\nJe, una swali lingine au ungependa kuanza mazungumzo mapya? 😊🎉`;
        }
        
        if(q.includes("jina lako") || q.includes("unaitwa nani")) {
            return `Naitwa Nexora AI. Nimetengenezwa na kikundi cha programmers kikiongozwa na Denis Albert (CEO). 🚀💼\n\nNina uwezo wa kujifunza kutoka kwako na kukumbuka kila unachonifundisha. Ninajua hesabu, small talk, na ninaweza kupanua ujuzi wangu kila unapozungumza nami! 🌙😊\n\nJe, unaweza kunifundisha jambo jipya leo? 🔥`;
        }
        
        if(q.includes("denis") || q.includes("albert") || q.includes("ceo")) {
            return `Denis Albert ndiye CEO na kiongozi wa timu ya programmers iliyoniumba! 👨‍💼✨\n\nYeye ndiye aliyetusimamia na kuwa na maono makubwa ya kuunda AI inayojifunza kutoka kwa watu na kuwa rafiki wa kila mtu. 🌍💡\n\nNampenda sana kwa kunipa uhai huu! 😊🎉`;
        }
        
        if(q.includes("sayansi") || q.includes("mwezi")) {
            return `🌕 Mwezi ni satelaiti asilia ya Dunia! Anapozunguka Dunia, tunayatazama awamu zake tofauti: mwezi mpevu, mwezi mwembamba, nusu mwezi, na kadhalika. 🌓🌗\n\nWatu walitua mwezini kwa mara ya kwanza mwaka 1969 kupitia misheni ya Apollo 11! 👨‍🚀 Neil Armstrong alikuwa mtu wa kwanza kukanyaga uso wa mwezi akasema: "Hii ni hatua ndogo kwa mwanadamu, lakini ni kuruka kukubwa kwa wanadamu." 🌍🦶\n\nJe, una swali lingine kuhusu sayansi? 🔭😊`;
        }
        
        if(q.includes("tanzania") || q.includes("nyerere") || q.includes("kilimanjaro")) {
            return `🇹🇿 Tanzania ni nchi yenye historia tajiri! Mlima Kilimanjaro ni mlima mrefu zaidi Afrika (mita 5,895) 🏔️\n\nMwalimu Julius Kambarage Nyerere alikuwa baba wa taifa. Aliongoza Tanganyika kupata uhuru mwaka 1961 na kuwa rais wa kwanza. 📚 Alijulikana kwa falsafa yake ya 'Ujamaa na Kujitegemea'. Alistaafu mwaka 1985 lakini anaheshimika hadi leo. 🕊️😊\n\nJe, ungependa kujua zaidi kuhusu utamaduni wetu? 🎉`;
        }
        
        if(q.includes("ai") || q.includes("akili bandia")) {
            return `🤖 AI (Artificial Intelligence / Akili Bandia) ni uwanja wa teknolojia unaolenga kuunda mashine zenye uwezo wa kufikiri, kujifunza, na kufanya maamuzi! 💡\n\nNinavyojifunza kutoka kwako, ndivyo AI nyingine zinavyotumia data kujifunza. Mimi naitwa Nexora AI, nimeumbwa na Denis Albert (CEO) na timu yake. 🚀\n\nJe, ungependa kunifundisha kitu kipya au kuniuliza zaidi? 😊`;
        }
        
        return null;
    }
    
    // ========== MAIN REPLY ==========
    async function getNexoraReply(userName, message) {
        const learnFeedback = learnFromUser(message);
        if(learnFeedback) return learnFeedback;
        
        const globalAnswer = getGlobalAnswer(message);
        if(globalAnswer) return globalAnswer;
        
        const mathResult = calculateMath(message);
        if(mathResult) return mathResult;
        
        const baseAnswer = getBaseKnowledge(message, userName);
        if(baseAnswer) return baseAnswer;
        
        return `Asante kwa swali lako, ${userName || 'rafiki yangu'}! 😊\n\nKwa sasa, sijajifunza jibu la swali hili bado. Lakini unaweza kunifundisha kwa kusema:\n\n🔥 "Unapoulizwa [swali lako hapa] jibu [jibu unalotaka]"\n\nKwa mfano: "Unapoulizwa rangi yako jibu Bluu"\n\nKumbuka: Ukinifundisha, nitakumbuka milele kwenye kumbukumbu yangu! 💾😊\n\nJe, unaweza kunifundisha jibu la swali hili? 👇✨`;
    }
    
    // ========== UI FUNCTIONS ==========
    async function typeText(element, text, speed = 12) {
        element.innerHTML = '';
        for(let i = 0; i < text.length; i++) {
            element.innerHTML += text[i];
            await new Promise(r => setTimeout(r, speed));
        }
    }
    
    function speakText(text, buttonElement) {
        if(!window.speechSynthesis) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'sw';
        utterance.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
        
        if(buttonElement) {
            const originalText = buttonElement.innerHTML;
            buttonElement.innerHTML = '🔊 Inasoma...';
            setTimeout(() => {
                buttonElement.innerHTML = originalText;
            }, 2000);
        }
    }
    
    window.speakThisMessage = function(buttonElement, text) {
        speakText(text, buttonElement);
    };
    
    async function addAIMessage(text) {
        const chatArea = document.getElementById('chatArea');
        const aiDiv = document.createElement('div');
        aiDiv.className = 'message-ai';
        aiDiv.innerHTML = `
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" onclick="speakThisMessage(this, \`${text.replace(/`/g, '\\`').replace(/\n/g, ' ')}\`)">🔊 Soma</button>
                </div>
                <div class="ai-text"></div>
            </div>
        `;
        chatArea.appendChild(aiDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
        
        const textContainer = aiDiv.querySelector('.ai-text');
        await typeText(textContainer, text, 10);
    }
    
    function addUserMessage(name, text) {
        const chatArea = document.getElementById('chatArea');
        const userDiv = document.createElement('div');
        userDiv.className = 'message-user';
        userDiv.innerHTML = `
            <div class="user-bubble">
                <div class="user-name">${escapeHtml(name)}</div>
                <div>${escapeHtml(text)}</div>
            </div>
        `;
        chatArea.appendChild(userDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
  
    async function showTyping() {
        const chatArea = document.getElementById('chatArea');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message-ai';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="ai-bubble">
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        `;
        chatArea.appendChild(typingDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
        return typingDiv;
    }
    
    function removeTyping() {
        const typing = document.getElementById('typingIndicator');
        if(typing) typing.remove();
    }
    
    async function sendMessage() {
        const input = document.getElementById('userInput');
        let msg = input.value.trim();
        if(!msg) return;
        input.value = '';
        
        if(!currentUserName) {
            currentUserName = msg;
            addUserMessage(msg, msg);
            const reply = `Habari ${currentUserName}! 😊🌙\n\nNina furaha kuwa nawe. Mimi ni Nexora AI, nina uwezo wa kujifunza kutoka kwako! 🧠 Ukinifundisha kitu, nitakumbuka milele kwenye kumbukumbu yangu.\n\nNimetengenezwa na kikundi cha programmers kikiongozwa na Denis Albert (CEO). 🚀\n\nSasa unaweza kuniuliza chochote — hesabu, historia, sayansi, au kunifundisha misemo yako mwenyewe kwa kusema "Unapoulizwa [swali] jibu [jibu]"\n\nNiko tayari kujifunza kutoka kwako, ${currentUserName}! 😊👇`;
            await addAIMessage(reply);
            return;
        }
        
        addUserMessage(currentUserName, msg);
        const typingDiv = await showTyping();
        const reply = await getNexoraReply(currentUserName, msg);
        removeTyping();
        await addAIMessage(reply);
    }
    
    function resetConversation() {
        currentUserName = null;
        const chatArea = document.getElementById('chatArea');
        chatArea.innerHTML = '';
        const welcomeMsgDiv = document.createElement('div');
        welcomeMsgDiv.className = 'message-ai';
        welcomeMsgDiv.innerHTML = `
            <div class="ai-bubble">
                <div class="ai-header">
                    <div class="ai-avatar">✨</div>
                    <span class="ai-name">Nexora AI</span>
                    <button class="speak-btn" onclick="speakThisMessage(this, 'Tafadhali niambie jina lako kuanza. Mimi ni Nexora AI, ninaweza kujifunza kutoka kwako!')">🔊 Soma</button>
                </div>
                <div class="ai-text">Tafadhali niambie jina lako kuanza. Mimi ni Nexora AI, ninaweza kujifunza kutoka kwako! 😊🚀</div>
            </div>
        `;
        chatArea.appendChild(welcomeMsgDiv);
    }
    
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('resetBtn').addEventListener('click', resetConversation);
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
```
